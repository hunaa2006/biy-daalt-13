<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Миний даалгаврууд</h1>
        
        <div class="add-task">
            <input type="text" id="taskTitle" placeholder="Даалгаврын нэр...">
            <select id="taskPriority">
                <option value="low">Нам</option>
                <option value="medium" selected>Дунд</option>
                <option value="high">Өндөр</option>
            </select>
            <button onclick="addTask()">Нэмэх</button>
        </div>

        <div class="filters">
            <button onclick="loadTasks()">Бүгд</button>
            <button onclick="loadTasks('completed')">Дууссан</button>
            <button onclick="loadTasks('pending')">Хүлээгдэж буй</button>
        </div>

        <div id="taskList" class="task-list"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
